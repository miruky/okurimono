<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-labelledby="arch-title">
  <title id="arch-title">okurimonoの構成図。UI層(app・main・motion)が純関数のロジック層(record・okaeshi・person・stats・csv・backup・theme)を呼び、記録とテーマはlocalStorageに、書き出しはJSON/CSVファイルに渡る。</title>
  <style>
    .box { fill: #faf7f2; stroke: #e2dacd; stroke-width: 1.5; }
    .layer { fill: #efe9e1; stroke: #e2dacd; stroke-width: 1.5; }
    .name { fill: #2a2420; font: 600 15px system-ui, sans-serif; }
    .label { fill: #6b5f57; font: 12px system-ui, sans-serif; }
    .layer-name { fill: #9a3b46; font: 700 12px system-ui, sans-serif; letter-spacing: 0.16em; }
    .edge { stroke: #75685e; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    .edge-label { fill: #75685e; font: 12px system-ui, sans-serif; }
    #arrow path { fill: #75685e; }
    @media (prefers-color-scheme: dark) {
      .box { fill: #211c19; stroke: #322c27; }
      .layer { fill: #14110f; stroke: #322c27; }
      .name { fill: #ece4dc; }
      .label { fill: #a99d92; }
      .layer-name { fill: #d98a8f; }
      .edge { stroke: #908377; }
      .edge-label { fill: #908377; }
      #arrow path { fill: #908377; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" />
    </marker>
  </defs>

  <!-- UI層 -->
  <rect class="layer" x="40" y="28" width="820" height="116" rx="12" />
  <text class="layer-name" x="64" y="54">UI 層</text>
  <rect class="box" x="64" y="68" width="232" height="60" rx="10" />
  <text class="name" x="180" y="96" text-anchor="middle">app.ts</text>
  <text class="label" x="180" y="116" text-anchor="middle">骨格を一度描き、領域だけ更新</text>
  <rect class="box" x="310" y="68" width="232" height="60" rx="10" />
  <text class="name" x="426" y="96" text-anchor="middle">main.ts</text>
  <text class="label" x="426" y="116" text-anchor="middle">起動・種まき・テーマ適用</text>
  <rect class="box" x="556" y="68" width="240" height="60" rx="10" />
  <text class="name" x="676" y="96" text-anchor="middle">motion.ts</text>
  <text class="label" x="676" y="116" text-anchor="middle">GSAPの入場・カウントアップ</text>

  <path class="edge" d="M260 144 V196" />
  <path class="edge" d="M450 144 V196" />
  <path class="edge" d="M640 144 V196" />

  <!-- ロジック層(純関数) -->
  <rect class="layer" x="40" y="200" width="820" height="160" rx="12" />
  <text class="layer-name" x="64" y="226">ロジック層 — 純関数・DOM非依存</text>

  <rect class="box" x="64" y="240" width="185" height="44" rx="10" />
  <text class="name" x="156" y="267" text-anchor="middle">record.ts</text>
  <rect class="box" x="263" y="240" width="185" height="44" rx="10" />
  <text class="name" x="355" y="267" text-anchor="middle">okaeshi.ts</text>
  <rect class="box" x="462" y="240" width="185" height="44" rx="10" />
  <text class="name" x="554" y="267" text-anchor="middle">person.ts</text>
  <rect class="box" x="661" y="240" width="135" height="44" rx="10" />
  <text class="name" x="728" y="267" text-anchor="middle">stats.ts</text>

  <rect class="box" x="64" y="300" width="185" height="44" rx="10" />
  <text class="name" x="156" y="327" text-anchor="middle">csv.ts</text>
  <rect class="box" x="263" y="300" width="185" height="44" rx="10" />
  <text class="name" x="355" y="327" text-anchor="middle">backup.ts</text>
  <rect class="box" x="462" y="300" width="185" height="44" rx="10" />
  <text class="name" x="554" y="327" text-anchor="middle">theme.ts</text>
  <text class="label" x="661" y="320">型・検証・集計・お返し・</text>
  <text class="label" x="661" y="338">取り込み・テーマを分離</text>

  <path class="edge" d="M156 360 V416" />
  <text class="edge-label" x="168" y="392">保存・復元</text>
  <path class="edge" d="M554 360 V416" />
  <text class="edge-label" x="566" y="392">書き出し・取り込み</text>

  <!-- 保存・入出力 -->
  <rect class="box" x="64" y="420" width="280" height="48" rx="10" />
  <text class="name" x="204" y="449" text-anchor="middle">localStorage(記録・テーマ)</text>

  <rect class="box" x="462" y="420" width="280" height="48" rx="10" />
  <text class="name" x="602" y="449" text-anchor="middle">JSON / CSV ファイル</text>
</svg>
